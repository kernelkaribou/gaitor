services:
  gaitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: gaitor:dev
    container_name: gaitor-dev
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - LOG_LEVEL=DEBUG
      # - HUGGINGFACE_TOKEN=your_token_here
      # - CIVITAI_API_KEY=your_key_here
    ports:
      - "8487:8487"
    volumes:
      - ./test-library:/library
      - ./test-dest:/hosts/local
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8487/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

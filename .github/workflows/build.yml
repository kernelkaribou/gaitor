name: Build and Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (multi-arch check)
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: false
        load: true
        tags: test-image
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        mkdir -p /tmp/test-library /tmp/test-dest
        chmod 777 /tmp/test-library /tmp/test-dest
        docker run -d --name test-container -p 8487:8487 \
          -v /tmp/test-library:/library \
          -v /tmp/test-dest:/dest/local \
          test-image
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8487/health; then
            echo " Container healthy after ${i}s"
            exit 0
          fi
          sleep 1
        done
        echo "Container failed to become healthy"
        docker logs test-container
        exit 1
